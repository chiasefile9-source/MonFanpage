<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Fanpage | Tin Tức Hoạt Hình Thế Giới</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00e0b0;
            --dark-bg: #0a0a12;
            --glass: rgba(255, 255, 255, 0.05);
            --gradient: linear-gradient(90deg, #ff4d4d, #f9cb28); /* Màu nóng cho tin tức */
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Be Vietnam Pro', sans-serif;
            margin: 0;
            padding-top: 80px;
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 8%; background: rgba(10, 10, 18, 0.95);
            position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
        }

        /* --- TIN NÓNG MODAL --- */
        #hotNewsModal {
            display: none; position: fixed; z-index: 9999; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #1a1a2e; margin: 5% auto; padding: 0;
            width: 90%; max-width: 700px; border-radius: 20px;
            overflow: hidden; border: 1px solid var(--primary);
            position: relative; animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from {transform: translateY(100px); opacity: 0;} to {transform: translateY(0); opacity: 1;} }

        .modal-header {
            background: var(--gradient); padding: 15px;
            font-weight: bold; color: #000; text-align: center; font-size: 1.2rem;
        }

        .modal-body { padding: 25px; max-height: 70vh; overflow-y: auto; }
        .modal-body img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 25px; cursor: pointer; color: #000; }

        /* --- ADMIN PANEL --- */
        #adminPanel {
            display: none; background: var(--glass); margin: 20px 8%; padding: 30px;
            border-radius: 20px; border: 1px solid var(--primary);
        }

        /* --- NEWS FEED --- */
        .container { padding: 40px 8%; }
        .news-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px; margin-top: 30px;
        }

        .news-card {
            background: var(--glass); border-radius: 15px; overflow: hidden;
            transition: 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.05);
        }

        .news-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .news-img { width: 100%; height: 200px; object-fit: cover; }
        .news-body { padding: 20px; }
        .badge { background: #ff4d4d; color: #fff; padding: 4px 12px; border-radius: 50px; font-size: 11px; }

        .world-news-section { background: #16213e; padding: 40px 8%; margin-top: 50px; border-radius: 40px 40px 0 0; }

        input, textarea, select {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            color: white; border-radius: 8px; margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <!-- MODAL TIN NÓNG -->
    <div id="hotNewsModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeHotNews()">&times;</span>
            <div class="modal-header"><i class="fas fa-fire"></i> TIN NÓNG TRONG NGÀY</div>
            <div id="modalData" class="modal-body">
                <!-- Nội dung tin nóng sẽ hiện ở đây -->
            </div>
        </div>
    </div>

    <nav>
        <div style="font-weight: 700; font-size: 20px; letter-spacing: 1px;">MON <span style="color:var(--primary)">ANIMATION</span></div>
        <div>
            <button onclick="adminAuth()" style="background:none; border: 1px solid #444; color: #888; padding: 5px 15px; border-radius: 20px; cursor: pointer;">Admin</button>
        </div>
    </nav>

    <!-- BẢNG ĐIỀU KHIỂN ADMIN -->
    <section id="adminPanel">
        <h2 style="color: var(--primary); margin-top:0">Đăng bài báo mới</h2>
        <input type="text" id="title" placeholder="Tiêu đề bài viết...">
        <input type="text" id="image" placeholder="Link ảnh bìa...">
        <textarea id="content" rows="4" placeholder="Nội dung chi tiết bài báo..."></textarea>
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <label><input type="checkbox" id="isHot"> Đặt làm TIN NÓNG (Hiện lên ngay khi vào trang)</label>
        </div>
        <button onclick="publishNews()" style="width:100%; padding:15px; background:var(--primary); border:none; border-radius:8px; font-weight:bold; cursor:pointer">XUẤT BẢN</button>
    </section>

    <div class="container">
        <h1><i class="fas fa-bolt" style="color:#f9cb28"></i> Tin tức Mon Fanpage</h1>
        <div class="news-grid" id="newsFeed"></div>
    </div>

    <!-- TỔNG HỢP TIN THẾ GIỚI (GIẢ LẬP DỮ LIỆU) -->
    <section class="world-news-section">
        <h2 style="color:var(--primary)"><i class="fas fa-globe"></i> Hoạt hình Thế Giới</h2>
        <div class="news-grid" id="worldNewsFeed">
            <!-- Tin thế giới sẽ tự động render -->
        </div>
    </section>

    <script>
        const ADMIN_PASSWORD = "mon123";
        let isAdmin = false;

        // Dữ liệu tin hoạt hình thế giới mẫu
        const worldAnimationNews = [
            {
                title: "Spider-Man: Beyond the Spider-Verse cập nhật lịch chiếu mới",
                image: "https://images.unsplash.com/photo-1635805737707-575885ab0820?auto=format&fit=crop&w=500",
                desc: "Sony Pictures vừa công bố thêm thông tin về phần kết của bộ ba phim Người Nhện đình đám...",
                source: "Hollywood Reporter"
            },
            {
                title: "Studio Ghibli nhận giải Cành Cọ Vàng danh dự tại Cannes",
                image: "https://images.unsplash.com/photo-1578632292335-df3abbb0d586?auto=format&fit=crop&w=500",
                desc: "Lần đầu tiên một hãng phim hoạt hình được vinh danh tại liên hoan phim danh giá nhất thế giới.",
                source: "Anime News Network"
            },
            {
                title: "Disney thông báo dự án Frozen 3 và Toy Story 5",
                image: "https://images.unsplash.com/photo-1594909122845-11baa439b7bf?auto=format&fit=crop&w=500",
                desc: "Giám đốc điều hành Bob Iger khẳng định các phần tiếp theo đang được sản xuất rầm rộ.",
                source: "Variety"
            }
        ];

        // 1. Quản lý Admin
        function adminAuth() {
            if(prompt("Nhập mã Admin:") === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
                renderNews();
            }
        }

        // 2. Đăng bài và xử lý TIN NÓNG
        function publishNews() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const image = document.getElementById('image').value || 'https://via.placeholder.com/400x250';
            const isHot = document.getElementById('isHot').checked;

            if(!title || !content) return alert("Thiếu thông tin!");

            const post = { id: Date.now(), title, content, image, isHot, date: new Date().toLocaleString('vi-VN') };
            let posts = JSON.parse(localStorage.getItem('mon_news')) || [];
            posts.unshift(post);
            localStorage.setItem('mon_news', JSON.stringify(posts));
            
            location.reload(); // Load lại để kích hoạt tin nóng nếu có
        }

        // 3. Hiển thị tin và Popup Tin Nóng
        function renderNews() {
            const feed = document.getElementById('newsFeed');
            const posts = JSON.parse(localStorage.getItem('mon_news')) || [];
            
            // Render bài viết admin
            feed.innerHTML = posts.map((p, i) => `
                <div class="news-card" onclick="openDetail(${p.id})">
                    <img src="${p.image}" class="news-img">
                    <div class="news-body">
                        ${p.isHot ? '<span class="badge">TIN NÓNG</span>' : '<span class="badge" style="background:#444">BẢN TIN</span>'}
                        <h3 class="news-title">${p.title}</h3>
                        <p class="news-desc">${p.content.substring(0, 80)}...</p>
                        ${isAdmin ? `<button onclick="deletePost(${i})" style="color:red; background:none; border:none; cursor:pointer">Xóa bài</button>` : ''}
                    </div>
                </div>
            `).join('');

            // Kiểm tra tin nóng để hiện bảng ngay khi load trang
            const hotPost = posts.find(p => p.isHot === true);
            if(hotPost && !sessionStorage.getItem('hotNewsShown')) {
                showHotNews(hotPost);
                sessionStorage.setItem('hotNewsShown', 'true'); // Chỉ hiện 1 lần mỗi phiên truy cập
            }

            // Render tin thế giới
            const worldFeed = document.getElementById('worldNewsFeed');
            worldFeed.innerHTML = worldAnimationNews.map(n => `
                <div class="news-card">
                    <img src="${n.image}" class="news-img">
                    <div class="news-body">
                        <span class="badge" style="background:#4facfe">QUỐC TẾ</span>
                        <h3 class="news-title" style="font-size:1.1rem">${n.title}</h3>
                        <p class="news-desc">${n.desc}</p>
                        <small style="color:var(--primary)">Nguồn: ${n.source}</small>
                    </div>
                </div>
            `).join('');
        }

        // 4. Các hàm điều khiển Modal
        function showHotNews(post) {
            const modal = document.getElementById('hotNewsModal');
            const body = document.getElementById('modalData');
            body.innerHTML = `
                <img src="${post.image}">
                <h2>${post.title}</h2>
                <p style="color:#aaa; font-size:12px">${post.date}</p>
                <p style="line-height:1.8; color:#eee">${post.content}</p>
            `;
            modal.style.display = 'block';
        }

        function openDetail(id) {
            const posts = JSON.parse(localStorage.getItem('mon_news')) || [];
            const post = posts.find(p => p.id === id);
            showHotNews(post);
        }

        function closeHotNews() {
            document.getElementById('hotNewsModal').style.display = 'none';
        }

        function deletePost(index) {
            let posts = JSON.parse(localStorage.getItem('mon_news')) || [];
            posts.splice(index, 1);
            localStorage.setItem('mon_news', JSON.stringify(posts));
            renderNews();
        }

        window.onload = renderNews;
    </script>
</body>
</html>
